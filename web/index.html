<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Driftctl — Terraform Drift Detection</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <header>
    <h1>Driftctl</h1>
    <p>Terraform state vs live cloud infrastructure</p>
  </header>

  <main>
    <section class="panel">
      <h2>Workspaces</h2>
      <div id="workspaces" class="card-list">Loading…</div>
    </section>

    <section class="panel">
      <h2>Recent Scans</h2>
      <div id="scans" class="table-wrap">Loading…</div>
    </section>

    <section class="panel" id="report-panel" hidden>
      <h2>Drift Report <span id="report-scan-id"></span></h2>
      <div id="summary" class="summary-grid"></div>
      <div id="findings" class="table-wrap"></div>
    </section>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
